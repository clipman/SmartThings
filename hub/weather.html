<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>SmartThings Weather Bridge</title>
<style>
  /* ── 브리지 webview 실행용 페이지 ─────────────────────────────
     이 페이지는 사람이 보는 UI가 아닙니다.
     브리지 서버가 headless webview로 실행하여
     window.__result 에 저장된 JSON을 수집합니다.

     단, 디버그 목적으로 브라우저에서 직접 열면
     진행 상황과 결과를 확인할 수 있습니다.
  ─────────────────────────────────────────────────────────── */
  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --border: #30363d;
    --text: #e6edf3;
    --muted: #8b949e;
    --accent: #58a6ff;
    --ok: #3fb950;
    --warn: #d29922;
    --err: #f85149;
    --radius: 10px;
    --font: 'SF Mono', 'Fira Code', 'Consolas', monospace;
  }
  * { box-sizing: border-box; margin: 0; }
  html, body { background: var(--bg); color: var(--text); font-family: var(--font); font-size: 13px; line-height: 1.6; }
  body { padding: 20px; max-width: 680px; margin: 0 auto; }

  h1 { font-size: 15px; color: var(--accent); margin-bottom: 16px; letter-spacing: .04em; }
  .tag { display: inline-block; padding: 1px 7px; border-radius: 4px; font-size: 11px; font-weight: 600; margin-left: 8px; }
  .tag-run  { background: #1f3a28; color: var(--ok); }
  .tag-err  { background: #3a1f1f; color: var(--err); }
  .tag-wait { background: #2a2a1f; color: var(--warn); }

  .log-box { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 16px; margin-bottom: 12px; max-height: 260px; overflow-y: auto; }
  .log-line { padding: 1px 0; white-space: pre-wrap; word-break: break-all; }
  .log-line.ok   { color: var(--ok); }
  .log-line.warn { color: var(--warn); }
  .log-line.err  { color: var(--err); }
  .log-line.info { color: var(--muted); }

  .result-box { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 16px; }
  .result-box pre { white-space: pre-wrap; word-break: break-all; color: var(--text); font-family: var(--font); font-size: 12px; }

  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px 14px; }
  .card-title { font-size: 11px; color: var(--muted); margin-bottom: 6px; text-transform: uppercase; letter-spacing: .06em; }
  .card-val { font-size: 22px; color: var(--text); }
  .card-sub { font-size: 11px; color: var(--muted); margin-top: 2px; }
</style>
</head>
<body>

<h1>🌤 SmartThings Weather Bridge <span id="tag" class="tag tag-wait">실행 중...</span></h1>

<div class="log-box" id="logbox"></div>

<div class="grid" id="preview" style="display:none">
  <div class="card">
    <div class="card-title">날씨</div>
    <div class="card-val" id="pv-weather">--</div>
    <div class="card-sub" id="pv-temp">--°</div>
  </div>
  <div class="card">
    <div class="card-title">습도 / 체감</div>
    <div class="card-val" id="pv-humi">--%</div>
    <div class="card-sub" id="pv-feel">체감 --°</div>
  </div>
  <div class="card">
    <div class="card-title">최고 / 최저</div>
    <div class="card-val" id="pv-maxmin">-- / --°</div>
    <div class="card-sub" id="pv-wind">바람 --</div>
  </div>
  <div class="card">
    <div class="card-title">강수확률 / 강수량</div>
    <div class="card-val" id="pv-rain">--%</div>
    <div class="card-sub" id="pv-precip">--mm/h</div>
  </div>
</div>

<div class="result-box" id="result-box" style="display:none">
  <pre id="result-json"></pre>
</div>

<script>
// ════════════════════════════════════════════════════════════════
//  SmartThings Weather Bridge — weather.html
//
//  동작:
//    1. URL 파라미터에서 lat, lon, location 읽기
//    2. 네이버 날씨 페이지를 CORS 프록시로 fetch → parseWeather()
//    3. 결과를 window.__result 에 저장 (브리지가 수집)
//
//  브리지 호출 형식:
//    GET /api/webview/run?url=https://clipman.github.io/.../weather.html
//                        ?lat=37.57&lon=126.97&location=인천광역시+서구
//                        &timeout=60
//    * location: device.preferences.location (필수)
//
//  반환 JSON 구조 (window.__result):
//  {
//    "weather": {
//      "weather": "비",            "temperature": 18.5,
//      "feeltemp": 17.0,           "humidity": 75,
//      "dewpoint": 13.2,           "abshumidity": 11.8,
//      "windspeed": 2.3,           "windbearing": "남",
//      "rainpercent": 60,          "rainystart": "14:00",
//      "precipitation": 1.5,       "maxtemp": 22.0,
//      "mintemp": 15.0,            "uvgrade": "보통",
//      "weatherIcon": "wt9",       "weatherUrl": "https://...",
//      "tomorrow": {
//        "amWeather": "구름많음",  "pmWeather": "비",
//        "amRainfall": 20,         "pmRainfall": 60,
//        "minTemp": 16.0,          "maxTemp": 23.0,
//        "amIcon": "wt5",          "pmIcon": "wt9"
//      }
//    },
//    "ok": true,
//    "timestamp": 1716000000000
//  }
// ════════════════════════════════════════════════════════════════

// ── CORS 프록시 설정 ─────────────────────────────────────────
var CORS_PROXY = 'https://small-cloud-4849.clipman-076.workers.dev/proxy?url=';

// ── URL 파라미터 파싱 ────────────────────────────────────────
var _params = new URLSearchParams(window.location.search);
var LAT      = _params.get('lat')      || '37.57';
var LON      = _params.get('lon')      || '126.97';
var LOCATION = _params.get('location') || '';  // device.preferences.location (필수 항목)

// ── 로그 유틸 ───────────────────────────────────────────────
var _logbox = document.getElementById('logbox');
function log(msg, cls) {
  var d = document.createElement('div');
  d.className = 'log-line ' + (cls || 'info');
  d.textContent = '[' + new Date().toLocaleTimeString('ko-KR') + '] ' + msg;
  _logbox.appendChild(d);
  _logbox.scrollTop = _logbox.scrollHeight;
  console.log(msg);
}

// ── 수치 파싱 헬퍼 ──────────────────────────────────────────
function re2float(s) {
  if (!s) return null;
  var m = String(s).match(/-?\d+\.?\d?/);
  return m ? parseFloat(m[0]) : null;
}

// ── 이슬점 / 절대습도 계산 ──────────────────────────────────
function calcDewpoint(T, H) {
  var a = 17.67, b = 243.5;
  var lnH = Math.log(H / 100);
  return Math.round(10 * b * (lnH + a*T/(b+T)) / (a - lnH - a*T/(b+T))) / 10;
}
function calcAbsHumidity(T, H) {
  return Math.round(10 * (6.112 * Math.exp(17.67*T/(T+243.5)) * H * 18.01534) / ((273.15+T) * 8.31447215)) / 10;
}

// ── fetch with timeout ──────────────────────────────────────
async function fetchWithTimeout(url, timeoutMs) {
  timeoutMs = timeoutMs || 25000;
  var ctrl  = new AbortController();
  var timer = setTimeout(function() { ctrl.abort(); }, timeoutMs);
  try {
    var res = await fetch(CORS_PROXY + encodeURIComponent(url), { signal: ctrl.signal });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    return await res.text();
  } finally {
    clearTimeout(timer);
  }
}

// ════════════════════════════════════════════════════════════
//  파서: 네이버 날씨
// ════════════════════════════════════════════════════════════
function parseWeather(html) {
  var doc = new DOMParser().parseFromString(html, 'text/html');
  var get = function(sel) { var el = doc.querySelector(sel); return el ? el.textContent.trim() : ''; };

  // 기본 날씨 정보
  var location    = get('h2.title') || LOCATION;
  var weather     = get('span.weather');
  var temperature = re2float(get('div.temperature_text'));

  // 상세 정보 (체감·습도·바람·강수)
  var feeltemp = null, humidity = null, windbearing = null, windspeed = null, precipitation = 0;
  var infoEl = doc.querySelector('div.weather_info');
  if (infoEl) {
    var dts = infoEl.querySelectorAll('dt');
    for (var i = 0; i < dts.length; i++) {
      var txt = dts[i].textContent.trim();
      var dd  = dts[i].nextElementSibling;
      var val = dd ? dd.textContent.trim() : '';
      if (txt === '체감')          feeltemp    = re2float(val);
      else if (txt === '습도')     humidity    = parseInt(val) || null;
      else if (txt.endsWith('풍')) { windbearing = txt.slice(0, -1); windspeed = re2float(val); }
      else if (txt === '강수')     precipitation = re2float(val) || 0;
    }
    // 풍향 폴백
    if (!windbearing) {
      var m1 = infoEl.innerHTML.match(/([동서남북]+)풍/);
      if (m1) windbearing = m1[1];
      var m2 = infoEl.innerHTML.match(/([\d.]+)m\/s/);
      if (m2) windspeed = parseFloat(m2[1]);
    }
  }

  // 자외선
  var uvgrade = '';
  var todayList = doc.querySelector('ul.today_chart_list');
  if (todayList) {
    var lis = todayList.querySelectorAll('li');
    for (var j = 0; j < lis.length; j++) {
      var title = ((lis[j].querySelector('strong.title') || {}).textContent || '').trim();
      var ttxt  = ((lis[j].querySelector('span.txt')    || {}).textContent || '').trim();
      if (title === '자외선') { uvgrade = ttxt; break; }
    }
  }

  // 비 시작 시각
  var rainystart = '없음';
  var todayRain = true, tmrRain = true, isTmr = false;
  var hourlyItems = doc.querySelectorAll('div.graph_inner._hourly_weather ul li dl.graph_content');
  for (var k = 0; k < hourlyItems.length; k++) {
    var timeEl  = hourlyItems[k].querySelector('dt.time');
    var iconEl  = hourlyItems[k].querySelector('i.wt_icon');
    var timeText = timeEl ? timeEl.textContent.trim() : '';
    var iconText = iconEl ? iconEl.textContent.trim() : '';
    if (timeText.indexOf('내일') >= 0) { todayRain = false; isTmr = true; }
    if (timeText.indexOf('모레') >= 0) { tmrRain  = false; isTmr = false; }
    if (iconText.indexOf('비') >= 0 || iconText.indexOf('소나기') >= 0) {
      if (todayRain) { todayRain = false; rainystart = timeText; }
    }
  }

  // 강수확률 (오전/오후)
  var todayRains = doc.querySelectorAll('.list_box._weekly_weather li:first-child .rainfall');
  var amRain = todayRains[0] ? (parseInt(todayRains[0].textContent) || 0) : 0;
  var pmRain = todayRains[1] ? (parseInt(todayRains[1].textContent) || 0) : 0;
  var rainpercent = (new Date().getUTCHours() + 9) % 24 < 12 ? Math.max(amRain, pmRain) : pmRain;

  // 이슬점 / 절대습도
  var T = temperature || 0, H = humidity || 0;
  var dewpoint    = H > 0 ? calcDewpoint(T, H)    : null;
  var abshumidity = H > 0 ? calcAbsHumidity(T, H) : null;

  // 오늘 최고/최저
  var mintemp = re2float(get('.list_box._weekly_weather li:first-child span.lowest'));
  var maxtemp = re2float(get('.list_box._weekly_weather li:first-child span.highest'));

  // 내일 날씨
  var tomorrow = {};
  var tmrEl = doc.querySelector('.list_box._weekly_weather li:nth-child(2)');
  if (tmrEl) {
    var tmrIcons = tmrEl.querySelectorAll('i.wt_icon');
    var tmrRains = tmrEl.querySelectorAll('.rainfall');
    if (tmrIcons[0]) {
      var wm0 = tmrIcons[0].className.match(/ico_(wt\d+)/);
      tomorrow.amIcon    = wm0 ? wm0[1] : '';
      tomorrow.amWeather = ((tmrIcons[0].querySelector('.blind') || {}).textContent || '').trim();
    }
    if (tmrIcons[1]) {
      var wm1 = tmrIcons[1].className.match(/ico_(wt\d+)/);
      tomorrow.pmIcon    = wm1 ? wm1[1] : '';
      tomorrow.pmWeather = ((tmrIcons[1].querySelector('.blind') || {}).textContent || '').trim();
    }
    tomorrow.amRainfall = tmrRains[0] ? (parseInt(tmrRains[0].textContent) || 0) : 0;
    tomorrow.pmRainfall = tmrRains[1] ? (parseInt(tmrRains[1].textContent) || 0) : 0;
    tomorrow.minTemp    = re2float((tmrEl.querySelector('.lowest')  || {}).textContent || '');
    tomorrow.maxTemp    = re2float((tmrEl.querySelector('.highest') || {}).textContent || '');
  }

  // 날씨 아이콘
  var ICON_BASE  = 'https://ssl.pstatic.net/sstatic/keypage/outside/scui/weather_new/img/weather_svg_v2/';
  var weatherIcon = '', weatherUrl = '';
  var iconEls = doc.querySelectorAll('i[class*="ico_wt"]');
  for (var ci = 0; ci < iconEls.length; ci++) {
    var wm = iconEls[ci].className.match(/ico_(wt\d+)/);
    if (wm) { weatherIcon = wm[1]; weatherUrl = ICON_BASE + 'icon_flat_' + wm[1] + '.svg'; break; }
  }

  return {
    location: location,
    weather: weather,
    temperature: temperature,
    feeltemp: feeltemp,
    maxtemp: maxtemp,
    mintemp: mintemp,
    humidity: humidity,
    dewpoint: dewpoint,
    abshumidity: abshumidity,
    rainpercent: rainpercent,
    rainystart: rainystart,
    precipitation: precipitation,
    windspeed: windspeed,
    windbearing: windbearing,
    uvgrade: uvgrade,
    weatherIcon: weatherIcon,
    weatherUrl: weatherUrl,
    tomorrow: tomorrow,
  };
}

// ════════════════════════════════════════════════════════════
//  미리보기 UI 업데이트 (디버그용)
// ════════════════════════════════════════════════════════════
function updatePreview(w) {
  document.getElementById('preview').style.display = 'grid';
  var s = function(id, v) { var el = document.getElementById(id); if (el) el.textContent = v; };
  s('pv-weather', w.weather || '--');
  s('pv-temp',    (w.temperature != null ? w.temperature : '--') + '°C');
  s('pv-humi',    (w.humidity    != null ? w.humidity    : '--') + '%');
  s('pv-feel',    '체감 ' + (w.feeltemp != null ? w.feeltemp : '--') + '°');
  s('pv-maxmin',  (w.maxtemp != null ? w.maxtemp : '--') + '° / ' + (w.mintemp != null ? w.mintemp : '--') + '°');
  s('pv-wind',    (w.windbearing || '') + '풍 ' + (w.windspeed != null ? w.windspeed : '--') + 'm/s');
  s('pv-rain',    (w.rainpercent || 0) + '%');
  s('pv-precip',  (w.precipitation || 0) + 'mm/h  비: ' + (w.rainystart || '없음'));
}

// ════════════════════════════════════════════════════════════
//  메인: 날씨 수집 → window.__result 저장
// ════════════════════════════════════════════════════════════
async function main() {
  var tag = document.getElementById('tag');

  log('lat=' + LAT + ', lon=' + LON + ', location=' + LOCATION);

  // ── 1. 위치명 (device.preferences.location 에서 전달받음) ──
  var locationName = LOCATION;
  log('위치명: ' + locationName, 'ok');

  // ── 2. 네이버 날씨 fetch ─────────────────────────────────
  var ts = Date.now();
  var naverUrl = 'https://search.naver.com/search.naver?query='
               + encodeURIComponent(locationName + ' 날씨') + '&_=' + ts;
  log('네이버 날씨 fetch: ' + naverUrl);

  var weatherData = null;
  var errMsg = null;

  try {
    var html = await fetchWithTimeout(naverUrl, 25000);
    weatherData = parseWeather(html);

    // 기본 유효성 검사
    if (!weatherData.temperature && !weatherData.weather) {
      throw new Error('파싱된 날씨 데이터가 비어 있습니다 (셀렉터 불일치 가능성)');
    }
    log('파싱 완료: ' + weatherData.weather + ' ' + weatherData.temperature + '°C', 'ok');
    updatePreview(weatherData);

  } catch(e) {
    errMsg = String(e && e.message || e || 'unknown');
    log('날씨 fetch/파싱 실패: ' + errMsg, 'err');
  }

  // ── 3. 결과 구성 ────────────────────────────────────────
  var result;
  if (weatherData && weatherData.temperature != null) {
    result = {
      ok: true,
      timestamp: Date.now(),
      weather: {
        weather:       weatherData.weather       || '',
        temperature:   weatherData.temperature,
        feeltemp:      weatherData.feeltemp,
        humidity:      weatherData.humidity,
        dewpoint:      weatherData.dewpoint,
        abshumidity:   weatherData.abshumidity,
        windspeed:     weatherData.windspeed,
        windbearing:   weatherData.windbearing   || '모름',
        rainpercent:   weatherData.rainpercent   || 0,
        rainystart:    weatherData.rainystart     || '없음',
        precipitation: weatherData.precipitation || 0,
        maxtemp:       weatherData.maxtemp,
        mintemp:       weatherData.mintemp,
        uvgrade:       weatherData.uvgrade        || '',
        weatherIcon:   weatherData.weatherIcon    || '',
        weatherUrl:    weatherData.weatherUrl     || '',
        location:      weatherData.location       || locationName,
        tomorrow: {
          amWeather:   (weatherData.tomorrow && weatherData.tomorrow.amWeather)   || '',
          pmWeather:   (weatherData.tomorrow && weatherData.tomorrow.pmWeather)   || '',
          amRainfall:  (weatherData.tomorrow && weatherData.tomorrow.amRainfall)  || 0,
          pmRainfall:  (weatherData.tomorrow && weatherData.tomorrow.pmRainfall)  || 0,
          minTemp:     (weatherData.tomorrow && weatherData.tomorrow.minTemp)     || null,
          maxTemp:     (weatherData.tomorrow && weatherData.tomorrow.maxTemp)     || null,
          amIcon:      (weatherData.tomorrow && weatherData.tomorrow.amIcon)      || '',
          pmIcon:      (weatherData.tomorrow && weatherData.tomorrow.pmIcon)      || '',
        },
      },
    };
    tag.className = 'tag tag-run';
    tag.textContent = '완료';
    log('window.__result 저장 완료', 'ok');
  } else {
    result = {
      ok: false,
      timestamp: Date.now(),
      error: errMsg || '날씨 데이터 없음',
      weather: {},
    };
    tag.className = 'tag tag-err';
    tag.textContent = '실패';
    log('데이터 없음 — 실패 결과 저장', 'err');
  }

  // ── 4. 브리지가 읽어갈 결과 저장 ─────────────────────────
  window.__result = result;

  // 디버그 UI: JSON 결과 표시
  var rb = document.getElementById('result-box');
  rb.style.display = 'block';
  document.getElementById('result-json').textContent = JSON.stringify(result, null, 2);
}

// 페이지 로드 후 즉시 실행
main().catch(function(e) {
  window.__result = { ok: false, error: String(e && e.message || e), weather: {}, timestamp: Date.now() };
  document.getElementById('tag').className = 'tag tag-err';
  document.getElementById('tag').textContent = '오류';
  console.error('[weather.html] 예외:', e);
});
</script>
</body>
</html>

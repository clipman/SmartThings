<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>SmartThings Editor</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Pretendard:wght@300;400;500;600&display=swap');

  :root {
    --bg:        #0d1117;
    --bg2:       #161b22;
    --bg3:       #21262d;
    --border:    #30363d;
    --accent:    #58a6ff;
    --accent2:   #3fb950;
    --warn:      #d29922;
    --danger:    #f85149;
    --text:      #e6edf3;
    --text2:     #8b949e;
    --text3:     #484f58;
    --radius:    10px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'Pretendard', -apple-system, sans-serif;
    font-size: 14px;
    line-height: 1.6;
    overflow: hidden;
  }

  body {
    display: flex;
    flex-direction: column;
    height: 100dvh;
    padding: 0;
  }

  /* ── 헤더 ── */
  header {
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    padding: 10px 16px;
    display: flex;
    align-items: center;
    gap: 10px;
    flex-shrink: 0;
  }

  .logo {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    font-weight: 600;
    color: var(--accent);
    letter-spacing: -0.3px;
  }

  .logo span { color: var(--text2); font-weight: 400; }

  /* ── 버튼 (헤더 오른쪽) ── */
  .btn-row {
    display: flex;
    gap: 8px;
    margin-left: auto;
  }

  button {
    padding: 6px 14px;
    border: none;
    border-radius: 6px;
    font-family: 'Pretendard', sans-serif;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.15s, transform 0.1s;
  }

  button:active { transform: scale(0.97); }
  button:disabled { opacity: 0.4; cursor: not-allowed; }

  .btn-save {
    background: var(--accent);
    color: #0d1117;
  }

  .btn-close {
    background: var(--bg3);
    color: var(--text2);
    border: 1px solid var(--border);
    padding: 6px 14px;
  }

  .btn-reload {
    background: var(--bg3);
    color: var(--text2);
    border: 1px solid var(--border);
    padding: 6px 10px;
  }

  /* ── 메인 ── */
  main {
    flex: 1;
    display: flex;
    flex-direction: column;
    padding: 12px 16px;
    gap: 10px;
    max-width: 800px;
    width: 100%;
    margin: 0 auto;
    overflow: hidden;
    padding-bottom: max(12px, env(safe-area-inset-bottom));
  }

  /* ── 상태 바 ── */
  #status-bar {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 12px;
    border-radius: var(--radius);
    font-size: 12px;
    background: var(--bg3);
    border: 1px solid var(--border);
    min-height: 36px;
    flex-shrink: 0;
  }

  #status-bar.loading { color: var(--text2); }
  #status-bar.ok      { border-color: var(--accent2); color: var(--accent2); }
  #status-bar.error   { border-color: var(--danger);  color: var(--danger); }
  #status-bar.warn    { border-color: var(--warn);    color: var(--warn); }

  .status-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    flex-shrink: 0;
    background: currentColor;
  }

  /* ── 에디터 영역 ── */
  .editor-wrap {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 8px;
    min-height: 0;
  }

  .editor-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    color: var(--text3);
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-shrink: 0;
  }

  .editor-label strong { color: var(--text); font-weight: 600; text-transform: none; letter-spacing: 0; }
  .editor-label .field-name { color: var(--text); font-weight: 600; text-transform: none; letter-spacing: 0; }

  .char-count {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--text3);
  }

  .char-count.warn { color: var(--warn); }

  textarea {
    flex: 1;
    min-height: 0;
    width: 100%;
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    line-height: 1.7;
    padding: 14px 16px;
    resize: none;
    outline: none;
    transition: border-color 0.15s;
  }

  textarea:focus { border-color: var(--accent); }
  textarea:disabled { opacity: 0.4; cursor: not-allowed; }

  /* ── 토스트 ── */
  #toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 8px 18px;
    font-size: 13px;
    color: var(--text);
    transition: transform 0.25s cubic-bezier(.34,1.56,.64,1);
    pointer-events: none;
    white-space: nowrap;
    z-index: 100;
  }

  #toast.show { transform: translateX(-50%) translateY(0); }
  #toast.ok   { border-color: var(--accent2); color: var(--accent2); }
  #toast.err  { border-color: var(--danger);  color: var(--danger); }
</style>
</head>
<body>

<header>
  <button class="btn-close" id="btn-close" onclick="window.close()">닫기</button>
  <div class="logo">ST<span>/</span>editor</div>
  <div class="btn-row">
    <button class="btn-reload" id="btn-reload" title="현재 값 다시 읽기" onclick="loadCurrentValue()">↺</button>
    <button class="btn-save"   id="btn-save"   disabled onclick="saveValue()">저장</button>
  </div>
</header>

<main>
  <div id="status-bar" class="loading">
    <div class="status-dot"></div>
    <span id="status-msg">초기화 중...</span>
  </div>

  <div class="editor-wrap">
    <div class="editor-label">
      <span id="editor-label-text">내용</span>
      <span class="char-count" id="cc">0</span>
    </div>
    <textarea id="editor" disabled placeholder="로딩 중..."></textarea>
  </div>
</main>

<div id="toast"></div>

<script>
// ──────────────────────────────────────────────
//  URL 파라미터 파싱
// ──────────────────────────────────────────────
const hashParams = new URLSearchParams(location.hash.slice(1));
const TOKEN     = hashParams.get('token') || '';
const DEVICE_ID = hashParams.get('d') || '';
const FIELD     = hashParams.get('f') || 'prompt';  // prompt | context | template | speak

// field → { component, capability, attribute, command, label }
const FIELD_MAP = {
  prompt:   { component: 'main',    capability: 'letsfly.prompt',   attribute: 'prompt',   command: 'setPrompt',   label: '프롬프트' },
  context:  { component: 'context', capability: 'letsfly.context',  attribute: 'context',  command: 'setContext',  label: '컨텍스트' },
  template: { component: 'main',    capability: 'letsfly.template', attribute: 'template', command: 'setTemplate', label: '템플릿' },
  speak:    { component: 'main',    capability: 'letsfly.speak',    attribute: 'speak',    command: 'setSpeak',    label: '메시지' },
};

const fieldCfg = FIELD_MAP[FIELD] || FIELD_MAP.prompt;

// ── UI 초기화
document.getElementById('editor-label-text').textContent = fieldCfg.label;
// device-info 영역은 loadDeviceInfo 후 editor-label에 반영

const editor  = document.getElementById('editor');
const btnSave = document.getElementById('btn-save');
const cc      = document.getElementById('cc');

editor.addEventListener('input', () => {
  const n = editor.value.length;
  cc.textContent = n.toLocaleString();
  cc.className = 'char-count' + (n > 60000 ? ' warn' : '');
});

// ──────────────────────────────────────────────
//  상태 표시
// ──────────────────────────────────────────────
function setStatus(type, msg) {
  const bar = document.getElementById('status-bar');
  bar.className = type;
  document.getElementById('status-msg').textContent = msg;
}

function showToast(msg, type = 'ok') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'show ' + type;
  clearTimeout(t._tid);
  t._tid = setTimeout(() => { t.className = ''; }, 2500);
}

// ──────────────────────────────────────────────
//  SmartThings API 공통 헤더
// ──────────────────────────────────────────────
function authHeaders(extra) {
  return Object.assign({ 'Authorization': 'Bearer ' + TOKEN }, extra);
}

// ──────────────────────────────────────────────
//  기기 정보 조회
// ──────────────────────────────────────────────
async function loadDeviceInfo() {
  const res = await fetch(
    'https://api.smartthings.com/v1/devices/' + DEVICE_ID,
    { headers: authHeaders() }
  );
  if (!res.ok) return;
  const data = await res.json();
  const deviceName = data.label || data.name || DEVICE_ID;
  document.getElementById('editor-label-text').innerHTML =
    '<strong>' + deviceName + '</strong>' +
    ' <span class="field-name">- ' + fieldCfg.label + '</span>';
}

// ──────────────────────────────────────────────
//  현재 값 읽기
// ──────────────────────────────────────────────
async function loadCurrentValue() {
  setStatus('loading', '현재 값 읽는 중...');
  editor.disabled  = true;
  btnSave.disabled = true;

  try {
    await loadDeviceInfo();

    const url =
      'https://api.smartthings.com/v1/devices/' + DEVICE_ID +
      '/components/' + fieldCfg.component +
      '/capabilities/' + fieldCfg.capability +
      '/status';

    const res = await fetch(url, { headers: authHeaders() });
    if (!res.ok) throw new Error('상태 조회 실패: ' + res.status);

    const data  = await res.json();
    const attr  = data[fieldCfg.attribute];
    const value = attr && attr.value !== undefined ? attr.value : '';

    editor.value     = typeof value === 'string' ? value : '';
    editor.disabled  = false;
    btnSave.disabled = false;
    editor.focus();

    cc.textContent = editor.value.length.toLocaleString();
    setStatus('ok', '준비 완료');
  } catch (e) {
    setStatus('error', e.message);
    showToast(e.message, 'err');
  }
}

// ──────────────────────────────────────────────
//  저장
// ──────────────────────────────────────────────
async function saveValue() {
  btnSave.disabled = true;
  setStatus('loading', '저장 중...');

  try {
    const body = {
      commands: [{
        component:  fieldCfg.component,
        capability: fieldCfg.capability,
        command:    fieldCfg.command,
        arguments:  [editor.value],
      }]
    };

    const res = await fetch(
      'https://api.smartthings.com/v1/devices/' + DEVICE_ID + '/commands',
      {
        method:  'POST',
        headers: authHeaders({ 'Content-Type': 'application/json' }),
        body:    JSON.stringify(body),
      }
    );

    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error((err.message || '저장 실패') + ' (' + res.status + ')');
    }

    setStatus('ok', '저장 완료');
    showToast('✅ 저장 완료', 'ok');
  } catch (e) {
    setStatus('error', e.message);
    showToast('❌ ' + e.message, 'err');
  } finally {
    btnSave.disabled = false;
  }
}

// ──────────────────────────────────────────────
//  시작
// ──────────────────────────────────────────────
(async function init() {
  history.replaceState(null, '', location.pathname);
  if (!TOKEN || !DEVICE_ID) {
    setStatus('error', 'URL 파라미터 오류');
    return;
  }
  await loadCurrentValue();
})();
</script>
</body>
</html>

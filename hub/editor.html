<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>SmartThings Editor</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Pretendard:wght@300;400;500;600&display=swap');

  :root {
    --bg:        #0d1117;
    --bg2:       #161b22;
    --bg3:       #21262d;
    --border:    #30363d;
    --accent:    #58a6ff;
    --accent2:   #3fb950;
    --warn:      #d29922;
    --danger:    #f85149;
    --text:      #e6edf3;
    --text2:     #8b949e;
    --text3:     #484f58;
    --radius:    10px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'Pretendard', -apple-system, sans-serif;
    font-size: 14px;
    line-height: 1.6;
  }

  body {
    display: flex;
    flex-direction: column;
    min-height: 100vh;
    padding: 0;
  }

  /* ── 헤더 ── */
  header {
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    padding: 12px 20px;
    display: flex;
    align-items: center;
    gap: 10px;
    flex-shrink: 0;
  }

  .logo {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    font-weight: 600;
    color: var(--accent);
    letter-spacing: -0.3px;
  }

  .logo span { color: var(--text2); font-weight: 400; }

  .field-badge {
    margin-left: auto;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 3px 10px;
    font-size: 11px;
    font-family: 'JetBrains Mono', monospace;
    color: var(--text2);
  }

  /* ── 메인 ── */
  main {
    flex: 1;
    display: flex;
    flex-direction: column;
    padding: 16px 20px;
    gap: 12px;
    max-width: 800px;
    width: 100%;
    margin: 0 auto;
  }

  /* ── 상태 바 ── */
  #status-bar {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 12px;
    border-radius: var(--radius);
    font-size: 12px;
    background: var(--bg3);
    border: 1px solid var(--border);
    min-height: 36px;
  }

  #status-bar.loading { color: var(--text2); }
  #status-bar.ok      { border-color: var(--accent2); color: var(--accent2); }
  #status-bar.error   { border-color: var(--danger);  color: var(--danger); }
  #status-bar.warn    { border-color: var(--warn);    color: var(--warn); }

  .status-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    flex-shrink: 0;
    background: currentColor;
  }

  /* ── 기기 정보 ── */
  #device-info {
    display: none;
    padding: 10px 12px;
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    font-size: 12px;
    color: var(--text2);
  }

  #device-info strong { color: var(--text); font-weight: 500; }

  /* ── 에디터 영역 ── */
  .editor-wrap {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .editor-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    color: var(--text3);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .char-count {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--text3);
  }

  .char-count.warn { color: var(--warn); }

  textarea {
    flex: 1;
    min-height: 220px;
    width: 100%;
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    line-height: 1.7;
    padding: 14px 16px;
    resize: vertical;
    outline: none;
    transition: border-color 0.15s;
  }

  textarea:focus { border-color: var(--accent); }
  textarea:disabled { opacity: 0.4; cursor: not-allowed; }

  /* ── 버튼 ── */
  .btn-row {
    display: flex;
    gap: 10px;
    flex-shrink: 0;
  }

  button {
    flex: 1;
    padding: 11px 16px;
    border: none;
    border-radius: var(--radius);
    font-family: 'Pretendard', sans-serif;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.15s, transform 0.1s;
  }

  button:active { transform: scale(0.98); }
  button:disabled { opacity: 0.4; cursor: not-allowed; }

  .btn-save {
    background: var(--accent);
    color: #0d1117;
  }

  .btn-reload {
    background: var(--bg3);
    color: var(--text2);
    border: 1px solid var(--border);
    flex: 0 0 auto;
    padding: 11px 14px;
  }

  /* ── 토스트 ── */
  #toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 8px 18px;
    font-size: 13px;
    color: var(--text);
    transition: transform 0.25s cubic-bezier(.34,1.56,.64,1);
    pointer-events: none;
    white-space: nowrap;
    z-index: 100;
  }

  #toast.show { transform: translateX(-50%) translateY(0); }
  #toast.ok   { border-color: var(--accent2); color: var(--accent2); }
  #toast.err  { border-color: var(--danger);  color: var(--danger); }
</style>
</head>
<body>

<header>
  <div class="logo">ST<span>/</span>editor</div>
  <div class="field-badge" id="field-badge">—</div>
</header>

<main>
  <div id="status-bar" class="loading">
    <div class="status-dot"></div>
    <span id="status-msg">초기화 중...</span>
  </div>

  <div id="device-info"></div>

  <div class="editor-wrap">
    <div class="editor-label">
      <span id="editor-label-text">내용</span>
      <span class="char-count" id="cc">0</span>
    </div>
    <textarea id="editor" disabled placeholder="로딩 중..."></textarea>
  </div>

  <div class="btn-row">
    <button class="btn-reload" id="btn-reload" title="현재 값 다시 읽기" onclick="loadCurrentValue()">↺</button>
    <button class="btn-save"   id="btn-save"   disabled onclick="saveValue()">저장</button>
  </div>
</main>

<div id="toast"></div>

<script>
// ──────────────────────────────────────────────
//  URL 파라미터 파싱
//  ?bridge=http://192.168.x.x:8088&d=DEVICE_ID&f=prompt
// ──────────────────────────────────────────────
const params     = new URLSearchParams(location.search);
const BRIDGE_URL = (params.get('bridge') || '').replace(/\/$/, '');
const DEVICE_ID  = params.get('d') || '';
const FIELD      = params.get('f') || 'prompt';  // prompt | context | template

// field → { component, capability, attribute, command, label }
const FIELD_MAP = {
  prompt:   { component: 'main',    capability: 'letsfly.prompt',   attribute: 'prompt',   command: 'setPrompt',   arg: 'prompt',   label: '프롬프트' },
  context:  { component: 'context', capability: 'letsfly.context',  attribute: 'context',  command: 'setContext',  arg: 'context',  label: '컨텍스트' },
  template: { component: 'main',    capability: 'letsfly.template', attribute: 'template', command: 'setTemplate', arg: 'template', label: '템플릿' },
};

const fieldCfg = FIELD_MAP[FIELD] || FIELD_MAP.prompt;

// ── UI 초기화
document.getElementById('field-badge').textContent = fieldCfg.label;
document.getElementById('editor-label-text').textContent = fieldCfg.label;

const editor   = document.getElementById('editor');
const btnSave  = document.getElementById('btn-save');
const cc       = document.getElementById('cc');

editor.addEventListener('input', () => {
  const n = editor.value.length;
  cc.textContent = n.toLocaleString();
  cc.className = 'char-count' + (n > 60000 ? ' warn' : '');
});

// ──────────────────────────────────────────────
//  상태 표시
// ──────────────────────────────────────────────
function setStatus(type, msg) {
  const bar = document.getElementById('status-bar');
  bar.className = type;
  document.getElementById('status-msg').textContent = msg;
}

function showToast(msg, type = 'ok') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'show ' + type;
  clearTimeout(t._tid);
  t._tid = setTimeout(() => { t.className = ''; }, 2500);
}

// ──────────────────────────────────────────────
//  브리지서버에서 Access Token 조회
// ──────────────────────────────────────────────
let cachedToken = null;
let tokenExpiresAt = 0;

async function getToken() {
  if (cachedToken && Date.now() < tokenExpiresAt - 60000) return cachedToken;

  if (!BRIDGE_URL) throw new Error('bridge 파라미터가 없습니다.');

  const res = await fetch(BRIDGE_URL + '/api/smartthings/access-token', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
  });

  if (!res.ok) throw new Error('브리지서버 응답 오류: ' + res.status);

  const data = await res.json();
  if (!data.authenticated || !data.accessToken) {
    throw new Error('SmartThings 인증 정보 없음');
  }

  cachedToken    = data.accessToken;
  tokenExpiresAt = data.expiresAt || (Date.now() + data.minutesLeft * 60000);
  return cachedToken;
}

// ──────────────────────────────────────────────
//  기기 정보 조회
// ──────────────────────────────────────────────
async function loadDeviceInfo(token) {
  const res = await fetch(
    'https://api.smartthings.com/v1/devices/' + DEVICE_ID,
    { headers: { 'Authorization': 'Bearer ' + token } }
  );
  if (!res.ok) return;
  const data = await res.json();
  const info = document.getElementById('device-info');
  info.style.display = 'block';
  info.innerHTML =
    '<strong>' + (data.label || data.name || DEVICE_ID) + '</strong>' +
    ' &nbsp;·&nbsp; <span>' + DEVICE_ID + '</span>';
}

// ──────────────────────────────────────────────
//  현재 값 읽기
// ──────────────────────────────────────────────
async function loadCurrentValue() {
  setStatus('loading', '현재 값 읽는 중...');
  editor.disabled = true;
  btnSave.disabled = true;

  try {
    const token = await getToken();
    await loadDeviceInfo(token);

    const url =
      'https://api.smartthings.com/v1/devices/' + DEVICE_ID +
      '/components/' + fieldCfg.component +
      '/capabilities/' + fieldCfg.capability +
      '/status';

    const res = await fetch(url, {
      headers: { 'Authorization': 'Bearer ' + token }
    });

    if (!res.ok) throw new Error('상태 조회 실패: ' + res.status);

    const data = await res.json();
    const attr = data[fieldCfg.attribute];
    const value = attr && attr.value !== undefined ? attr.value : '';

    editor.value    = typeof value === 'string' ? value : '';
    editor.disabled = false;
    btnSave.disabled = false;
    editor.focus();

    const n = editor.value.length;
    cc.textContent = n.toLocaleString();

    setStatus('ok', '준비 완료');
  } catch (e) {
    setStatus('error', e.message);
    showToast(e.message, 'err');
  }
}

// ──────────────────────────────────────────────
//  저장
// ──────────────────────────────────────────────
async function saveValue() {
  const value = editor.value;
  btnSave.disabled = true;
  setStatus('loading', '저장 중...');

  try {
    const token = await getToken();

    const body = {
      commands: [{
        component:  fieldCfg.component,
        capability: fieldCfg.capability,
        command:    fieldCfg.command,
        arguments:  [{ [fieldCfg.arg]: value }],
      }]
    };

    const res = await fetch(
      'https://api.smartthings.com/v1/devices/' + DEVICE_ID + '/commands',
      {
        method:  'POST',
        headers: {
          'Authorization': 'Bearer ' + token,
          'Content-Type':  'application/json',
        },
        body: JSON.stringify(body),
      }
    );

    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error((err.message || '저장 실패') + ' (' + res.status + ')');
    }

    setStatus('ok', '저장 완료');
    showToast('✅ 저장 완료', 'ok');
  } catch (e) {
    setStatus('error', e.message);
    showToast('❌ ' + e.message, 'err');
  } finally {
    btnSave.disabled = false;
  }
}

// ──────────────────────────────────────────────
//  시작
// ──────────────────────────────────────────────
(async function init() {
  if (!BRIDGE_URL || !DEVICE_ID) {
    setStatus('error', 'URL 파라미터 오류: bridge, d 필수');
    return;
  }
  await loadCurrentValue();
})();
</script>
</body>
</html>
